<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link rel="icon" type="image/png" href="images/icon1.png">
</head>

<style>
    body {
        background: #053b2d;
        color: white;
        font-family: Poppins;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #0d4d3c;
        padding: 30px;
        border-radius: 10px;
        width: 350px;
        text-align: center;
    }

    h2 {
        margin-bottom: 8px;
        font-size: 2rem;
    }

    input {
        margin-left: -10px;
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: none;
        border-radius: 6px;
    }

    button {
        border-radius: 6px;
        width: 90%;
        padding: 10px;
        margin-top: 15px;
        background: #ff7a00;
        border: none;
        color: white;
        cursor: pointer;
    }
</style>

<body>


    <div class="container">


        <h2>Reset Password</h2>


        <!-- STEP 1 -->
        <div id="emailSection">
            <input type="email" id="email" placeholder="Enter your email">
            <button onclick="sendReset()">Send Reset Link</button>
        </div>


        <!-- STEP 2 -->
        <div id="resetSection" style="display:none;">
            <input type="password" id="newPass" placeholder="Enter new password">
            <button onclick="resetPassword()">Update Password</button>
        </div>


        <p id="msg"></p>


    </div>


    <!-- ✅ POPUP -->
    <div id="popup" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
">
        <div style="
        background:#0d4d3c;
        padding:25px;
        border-radius:10px;
        text-align:center;
        width:300px;
    ">
            <h3 style="margin-bottom:10px;">Check your email 📩</h3>
            <p>A reset link has been sent to your email.</p>
            <button onclick="closePopup()" style="
            margin-top:15px;
            padding:10px;
            width:100%;
            background:#ff7a00;
            border:none;
            color:white;
            cursor:pointer;
        ">OK</button>
        </div>
    </div>


    <script>


        // ✅ YOUR BACKEND API
        const BASE_URL = "https://localhost:7201";


        // ✅ GET TOKEN FROM URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");
        const presetEmail = params.get("email");


        if (presetEmail) {
            document.getElementById("email").value = presetEmail;
        }


        // ✅ SWITCH UI IF FROM EMAIL LINK
        if (token) {
            document.getElementById("emailSection").style.display = "none";
            document.getElementById("resetSection").style.display = "block";
        }


        // ================= SEND RESET EMAIL =================
        async function sendReset() {
            const email = document.getElementById("email").value.trim();
            const msg = document.getElementById("msg");


            if (!email) {
                msg.innerText = "Please enter your email.";
                return;
            }


            try {
                const res = await fetch(`${BASE_URL}/api/Auth/forgot-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });


                const data = await res.json();


                if (res.ok) {
                    showPopup(); // ✅ SHOW POPUP
                } else {
                    msg.innerText = data.message;
                }


            } catch (err) {
                msg.innerText = "Error sending reset email.";
            }
        }


        // ================= RESET PASSWORD =================
        async function resetPassword() {
            const password = document.getElementById("newPass").value.trim();
            const msg = document.getElementById("msg");


            if (!password) {
                msg.innerText = "Please enter a password.";
                return;
            }


            try {
                const res = await fetch(`${BASE_URL}/api/Auth/reset-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        token: token,
                        password: password
                    })
                });


                const data = await res.json();
                msg.innerText = data.message;


                if (res.ok) {
                    setTimeout(() => {
                        window.location.replace("login.html");
                    }, 1500);
                }


            } catch (err) {
                msg.innerText = "Error resetting password.";
            }
        }


        // ================= POPUP FUNCTIONS =================
        function showPopup() {
            document.getElementById("popup").style.display = "flex";
        }


        function closePopup() {
            document.getElementById("popup").style.display = "none";
        }
    </script>


</body>

</html>
