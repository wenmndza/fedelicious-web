<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedelicious Admin | Reservations Intelligence</title>
    <link rel="icon" type="image/png" href="images/icon1.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #b2eec7;
            --sidebar-green: #98d8aa;
            --surface-bg: #e8f5e9;
            --accent-orange: #27ae60;
            --card-bg: #ffffff;
            --glass-white: rgba(255, 255, 255, 0.68);
            --text-muted: #7f8c8d;
            --text-dark: #2c3e50;
            --white: #ffffff;
            --status-green: #27ae60;
            --status-blue: #3498db;
            --status-red: #e74c3c;
            --panel-border: rgba(44, 62, 80, 0.08);
            --card-shadow: 0 12px 28px rgba(44, 62, 80, 0.08);
            --sidebar-dark: #2c3e50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--primary-green);
            color: var(--text-dark);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-green);
            padding: 30px 20px;
            position: fixed;
            height: 100%;
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            color: var(--text-dark);
            font-weight: 800;
            margin-bottom: 40px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            color: var(--text-dark);
            text-decoration: none;
            border-radius: 12px;
            transition: 0.3s;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .sidebar a.active {
            background-color: var(--accent-orange);
            color: white;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.35);
            color: var(--text-dark);
        }

        .logout-link {
            margin-top: auto;
            color: #e74c3c;
        }

        /* MAIN */
        .main {
            margin-left: 280px;
            padding: 30px 40px;
            width: 100%;
            min-height: 100vh;
            background: var(--surface-bg);
            border-top-left-radius: 40px;
            border-bottom-left-radius: 40px;
        }

        /* HEADER */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header-section h2 {
            font-size: clamp(20px, 3vw, 26px);
            color: var(--text-dark) !important;
        }

        /* FILTER TABS */
        .filter-tabs {
            display: flex;
            background: var(--card-bg);
            padding: 5px;
            border-radius: 15px;
            gap: 5px;
            border: 1px solid var(--panel-border);
            box-shadow: var(--card-shadow);
        }

        .tab-btn {
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .tab-btn.active {
            background: var(--accent-orange);
            color: white;
        }

        .tab-btn span {
            background: rgba(39, 174, 96, 0.12);
            color: var(--accent-orange);
            padding: 2px 6px;
            border-radius: 8px;
        }

        /* STATS */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 25px 0;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border-left: 4px solid var(--accent-orange);
            box-shadow: var(--card-shadow);
            border: 1px solid var(--panel-border);
        }

        .stat-card h3 {
            font-size: clamp(18px, 2.5vw, 24px);
        }

        .stat-card p {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* RESERVATION CARD */
        .res-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .res-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            display: grid;
            grid-template-columns: 60px 1fr auto auto;
            gap: 20px;
            align-items: center;
            transition: 0.3s;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--panel-border);
        }

        .res-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 30px rgba(44, 62, 80, 0.14);
        }

        /* AVATAR */
        .avatar-box {
            width: 55px;
            height: 55px;
            border-radius: 15px;
            background: rgba(39, 174, 96, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-orange);
        }

        /* INFO */
        .info-content h4 {
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .meta-line {
            display: flex;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .detail-item small {
            font-size: 10px;
            color: var(--text-muted);
        }

        .detail-item span {
            font-size: 13px;
        }

        .ref-code {
            color: var(--accent-orange);
        }

        /* STATUS */
        .status-container {
            text-align: center;
        }

        .status-badge {
            color: white;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .table-badge {
            margin-top: 8px;
            padding: 6px 10px;
            background: rgba(39, 174, 96, 0.1);
            border-radius: 8px;
            font-size: 0.75rem;
            color: var(--text-dark);
        }

        /* ACTION BUTTONS */
        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn {
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-confirm {
            background: rgba(39, 174, 96, 0.15);
            color: var(--status-green);
        }

        .btn-delete {
            background: rgba(231, 76, 60, 0.15);
            color: var(--status-red);
        }

        .confirmed-icon {
            color: var(--status-green);
            font-size: 24px;
        }

        /* EMPTY STATES */
        .empty-state,
        .loading-state,
        .error-state {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--panel-border);
        }

        /* ========================= */
        /* RESPONSIVE */
        /* ========================= */

        @media (max-width: 1024px) {
            .sidebar {
                width: 220px;
            }

            .main {
                margin-left: 220px;
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .res-card {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .logo-icon img,
            .brand-name,
            .brand {
                display: none;
            }

            .sidebar {
                position: fixed;
                bottom: 0;
                width: 100%;
                height: 70px;
                flex-direction: row;
                justify-content: space-around;
                padding: 0;
                z-index: 999;
            }

            .sidebar h2 {
                display: none;
            }

            .sidebar a {
                flex-direction: row;
                font-size: 8px;
                padding: 5px;
            }

            .main {
                margin-left: 0;
                padding: 20px;
                padding-bottom: 90px;
            }

            .stats-row {
                grid-template-columns: 1fr;
            }

            .res-card {
                grid-template-columns: 1fr;
            }

            .details-grid {
                grid-template-columns: 1fr;
            }
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-left: 10px;
        }


        .logo-icon img {
            width: 47px;
            height: 47px;
            background: var(--accent-orange);
            padding: 2px;
            border-radius: 50%;
        }


        .brand-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: white;
            margin-left: 5px;
            letter-spacing: 1px;
        }
    </style>

</head>

<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="logo-icon">
                <img src="images/fede.jpg" alt="Fedelicious Logo">
            </div>
            <span class="brand-name">FEDELICIOUS</span>
        </div>
        <a href="admin.html"><i class="fa-solid fa-gauge-high"></i> DASHBOARD</a>
        <a href="order_admin.html"><i class="fas fa-shopping-cart"></i> ORDERS</a>
        <a href="reservation_admin.html" class="active"><i class="fas fa-calendar-alt"></i> RESERVATIONS</a>
        <a href="menusetting.html"><i class="fas fa-utensils"></i> MENU SETTINGS</a>
        <a href="salesreport.html"><i class="fas fa-chart-line"></i> SALES REPORT</a>
        <a href="customeractivity.html"><i class="fa fa-user"></i> CUSTOMER ACTIVITY</a>
        <a href="admin_management.html" id="superAdminLink"><i class="fas fa-user-shield"></i> SYSTEM ADMINS</a>
        <a href="#" class="logout-link" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i>
            SIGN OUT</a>
    </aside>

    <main class="main">
        <div class="header-section">
            <div>
                <h2 style="font-weight: 800; color: var(--sidebar-dark);">RESERVATIONS</h2>
                <p style="font-size: 0.85rem; color: var(--text-muted);">Reservation and payment tracking</p>
            </div>

            <div class="filter-tabs">
                <button class="tab-btn active" id="tab-all" onclick="filterReservations('all')">All Bookings</button>
                <button class="tab-btn" id="tab-confirmed" onclick="filterReservations('confirmed')">Confirmed</button>
                <button class="tab-btn" id="tab-pending" onclick="filterReservations('pending')">Pending <span
                        id="pending-badge">0</span></button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card stat-total">
                <h3 id="total-count">0</h3>
                <p>Total Reservations</p>
            </div>
            <div class="stat-card stat-confirmed">
                <h3 id="confirmed-count">0</h3>
                <p>Confirmed Reservations</p>
            </div>
            <div class="stat-card stat-pending">
                <h3 id="pending-stat">0</h3>
                <p>Waiting Verification</p>
            </div>
        </div>

        <div id="res-list" class="res-container">
            <div class="loading-state">Loading reservations...</div>
        </div>
    </main>

    <script src="auth-session.js"></script>
    <script>
        const SP_API = "https://fedeliciousapi20260427050618-bmbgddcycgaseyff.southeastasia-01.azurewebsites.net/api/Sp/reservations";
        const ACTION_API = "https://fedeliciousapi20260427050618-bmbgddcycgaseyff.southeastasia-01.azurewebsites.net/api/Reservation";
        const adminSession = requireAdminAccess();
        let allReservations = [];
        let currentFilter = "all";

        async function loadReservations() {
            const container = document.getElementById("res-list");
            container.innerHTML = `<div class="loading-state">Loading reservations...</div>`;

            try {
                const res = await fetch(SP_API, {
                    headers: {
                        "accept": "*/*"
                    }
                });

                if (!res.ok) {
                    throw new Error(`Failed to load reservations. Status: ${res.status}`);
                }

                const data = await res.json();
                allReservations = Array.isArray(data) ? data : [];

                // NEW: Use customer_id to fetch the real name if the SP didn't join it
                await Promise.all(allReservations.map(async (item) => {
                    const existingName = item.full_name || item.fullName || item.Full_Name || item.customerName || item.Customer_Name;

                    // If name is placeholder or missing, and we have a customer_id
                    if ((!existingName || existingName === "GUEST CUSTOMER") && item.customer_id) {
                        try {
                            const authRes = await fetch(`https://fedeliciousapi20260427050618-bmbgddcycgaseyff.southeastasia-01.azurewebsites.net/api/Auth/getFullName/${item.customer_id}`);
                            if (authRes.ok) {
                                const authData = await authRes.json();
                                item.full_name = authData.full_name;
                            }
                        } catch (err) {
                            console.warn("Failed to fetch customer name for ID:", item.customer_id);
                        }
                    }
                }));

                updateDashboardUI();
            } catch (e) {
                console.error("Load Reservation Error:", e);
                container.innerHTML = `
                <div class="error-state">
                    Failed to load reservation data.<br>
                    Check your API / SP endpoint.
                </div>
            `;
            }
        }

        function updateDashboardUI() {
            const pendingCount = allReservations.filter(r => {
                const status = (r.reservation_status || "").toLowerCase();
                return status.includes("waiting") || status === "pending";
            }).length;

            const confirmedCount = allReservations.filter(r => {
                const status = (r.reservation_status || "").toLowerCase();
                return status === "confirmed";
            }).length;

            document.getElementById("total-count").innerText = allReservations.length;
            document.getElementById("confirmed-count").innerText = confirmedCount;
            document.getElementById("pending-stat").innerText = pendingCount;
            document.getElementById("pending-badge").innerText = pendingCount;

            filterReservations(currentFilter);
        }

        function filterReservations(type) {
            currentFilter = type;

            document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
            const activeTab = document.getElementById("tab-" + type);
            if (activeTab) {
                activeTab.classList.add("active");
            }

            let filtered = [...allReservations];

            if (type === "pending") {
                filtered = allReservations.filter(r => {
                    const status = (r.reservation_status || "").toLowerCase();
                    return status.includes("waiting") || status === "pending";
                });
            } else if (type === "confirmed") {
                filtered = allReservations.filter(r => {
                    const status = (r.reservation_status || "").toLowerCase();
                    return status === "confirmed";
                });
            }

            renderCards(filtered);
        }

        function getStatusColor(status) {
            const s = (status || "").toLowerCase();

            if (s.includes("waiting") || s === "pending") return "var(--status-blue)";
            if (s === "confirmed") return "var(--status-green)";
            if (s === "cancelled") return "var(--status-red)";

            return "#95a5a6";
        }

        function formatDate(dateValue) {
            if (!dateValue) return "N/A";
            const date = new Date(dateValue);
            if (isNaN(date.getTime())) return "N/A";

            return date.toLocaleDateString("en-US", {
                month: "short",
                day: "numeric",
                year: "numeric"
            });
        }

        function formatAmount(value) {
            const amount = Number(value || 0);
            return amount.toLocaleString("en-PH", {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function formatTime(value) {
            if (!value) return "N/A";

            if (typeof value === "string" && value.includes(":")) {
                const parts = value.split(":");
                const hour = parseInt(parts[0], 10);
                const minute = parts[1] || "00";

                if (!isNaN(hour)) {
                    const suffix = hour >= 12 ? "PM" : "AM";
                    const hour12 = hour % 12 || 12;
                    return `${hour12}:${minute} ${suffix}`;
                }
            }

            return value;
        }

        function escapeHtml(value) {
            if (value === null || value === undefined) return "";
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function renderCards(data) {
            const container = document.getElementById("res-list");

            if (!data.length) {
                container.innerHTML = `<div class="empty-state">No reservations found for this filter.</div>`;
                return;
            }

            container.innerHTML = data.map(item => {
                const statusText = item.reservation_status || "Unknown";
                const isWaiting = statusText.toLowerCase().includes("waiting") || statusText.toLowerCase() === "pending";
                const statusBg = getStatusColor(statusText);

                const customerName = item.full_name || item.fullName || item.Full_Name || item.customerName || item.Customer_Name || "GUEST CUSTOMER";
                const reservationDate = formatDate(item.reservation_date);
                const reservationTime = formatTime(item.reservation_time);
                const referenceNumber = item.reference_number || "N/A";
                const customerPhone = item.customer_phone || "No Phone";
                const amount = formatAmount(item.payment_amount);
                const notes = item.notes || "No instructions";
                const qrName = item.qr_name || "No QR Recorded";
                const qrAccName = item.qr_accname || "No Account Name";

                return `
                <div class="res-card">
                    <div class="avatar-box">
                        <i class="fas fa-user-circle"></i>
                    </div>

                    <div class="info-content">
                        <h4>${escapeHtml(customerName)}</h4>

                        <div class="meta-line">
                            <span><i class="far fa-calendar-alt"></i> ${reservationDate}</span>
                            <span><i class="far fa-clock"></i> ${escapeHtml(reservationTime)}</span>
                        </div>

                        <div class="details-grid">
                            <div class="detail-item">
                                <small>Ref Number</small>
                                <span class="ref-code">${escapeHtml(referenceNumber)}</span>
                            </div>

                            <div class="detail-item">
                                <small>Phone Number</small>
                                <span>${escapeHtml(customerPhone)}</span>
                            </div>

                            <div class="detail-item">
                                <small>Amount</small>
                                <span>₱${amount}</span>
                            </div>

                            <div class="detail-item">
                                <small>QR Used</small>
                                <span class="qr-badge">${escapeHtml(qrName)}</span>
                            </div>

                            <div class="detail-item">
                                <small>QR Account Name</small>
                                <span>${escapeHtml(qrAccName)}</span>
                            </div>

                            <div class="detail-item">
                                <small>Notes</small>
                                <span>${escapeHtml(notes)}</span>
                            </div>
                        </div>
                    </div>

                    <div class="status-container">
                        <div class="status-badge" style="background: ${statusBg}">
                            ${escapeHtml(statusText.toUpperCase())}
                        </div>
                        <div class="table-badge">TABLE T-0${escapeHtml(item.reservation_id)}</div>
                    </div>

                    <div class="action-btns">
                        ${isWaiting
                        ? `<button class="btn btn-confirm" onclick="confirmReservation(${item.reservation_id})" title="Confirm"><i class="fas fa-check"></i></button>`
                        : `<i class="fas fa-check-circle confirmed-icon" title="Verified"></i>`
                    }
                        <button class="btn btn-delete" onclick="deleteRes(${item.reservation_id})" title="Delete">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            `;
            }).join("");
        }

        async function confirmReservation(id) {
            if (!confirm("Verify payment and confirm booking?")) return;

            try {
                const res = await fetch(`${ACTION_API}/confirm/${id}`, {
                    method: "PUT",
                    headers: {
                        "accept": "*/*"
                    }
                });

                const result = await res.json().catch(() => null);

                if (res.ok) {
                    alert(result?.message || "Reservation confirmed successfully.");
                    loadReservations();
                } else {
                    alert(result?.message || "Failed to confirm reservation.");
                    console.error("Confirm Reservation Error:", result);
                }
            } catch (err) {
                console.error("Confirm Reservation Fetch Error:", err);
                alert("Error updating reservation.");
            }
        }

        async function deleteRes(id) {
            if (!confirm("Delete this record permanently?")) return;

            try {
                const res = await fetch(`${ACTION_API}/${id}`, {
                    method: "DELETE",
                    headers: {
                        "accept": "*/*"
                    }
                });

                const result = await res.json().catch(() => null);

                if (res.ok) {
                    alert(result?.message || "Reservation deleted successfully.");
                    loadReservations();
                } else {
                    alert(result?.message || "Failed to delete reservation.");
                    console.error("Delete Reservation Error:", result);
                }
            } catch (err) {
                console.error("Delete Reservation Fetch Error:", err);
                alert("Error deleting record.");
            }
        }

        function logout() {
            logoutToLogin({
                message: "Sign out from reservations management?"
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            if (!adminSession) {
                return;
            }

            updateSuperAdminLink(adminSession.role);
            loadReservations();
            setInterval(loadReservations, 30000);
        });
    </script>
</body>

</html>
